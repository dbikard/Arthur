<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
      user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 4px;
      color: #00e676;
      text-transform: uppercase;
    }

    .header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
      font-size: 1.1rem;
    }

    .header span {
      color: #b0bec5;
    }

    .header strong {
      color: #fff;
    }

    canvas {
      border: 2px solid #00e676;
      border-radius: 4px;
      background: #0f0f23;
      display: block;
    }

    .overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }

    .overlay .message {
      font-size: 1.4rem;
      color: #fff;
      text-align: center;
      line-height: 1.6;
    }

    .overlay .sub {
      font-size: 0.95rem;
      color: #90a4ae;
    }

    .controls-hint {
      font-size: 0.85rem;
      color: #607d8b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Snake</h1>
    <div class="header">
      <span>Score: <strong id="score">0</strong></span>
      <span>Best: <strong id="best">0</strong></span>
    </div>
    <div style="position: relative;">
      <canvas id="game" width="400" height="400"></canvas>
      <div class="overlay" id="overlay" style="width:400px;height:400px;">
        <div class="message" id="overlayMsg">Press any arrow key<br>or tap to start</div>
        <div class="sub" id="overlaySub"></div>
      </div>
    </div>
    <div class="controls-hint">Arrow keys / WASD / Swipe to move</div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayMsg = document.getElementById('overlayMsg');
    const overlaySub = document.getElementById('overlaySub');

    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;
    const TICK_MS = 110;

    let snake, dir, nextDir, food, score, bestScore, running, gameOver, loopId;

    bestScore = parseInt(localStorage.getItem('snakeBest') || '0', 10);
    bestEl.textContent = bestScore;

    function init() {
      const midX = Math.floor(COLS / 2);
      const midY = Math.floor(ROWS / 2);
      snake = [
        { x: midX, y: midY },
        { x: midX - 1, y: midY },
        { x: midX - 2, y: midY }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 0;
      running = false;
      gameOver = false;
      placeFood();
      draw();
      showOverlay('Press any arrow key<br>or tap to start', '');
    }

    function placeFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function showOverlay(msg, sub) {
      overlay.style.display = 'flex';
      overlayMsg.innerHTML = msg;
      overlaySub.innerHTML = sub;
    }

    function hideOverlay() {
      overlay.style.display = 'none';
    }

    function start() {
      if (running) return;
      running = true;
      hideOverlay();
      loopId = setInterval(tick, TICK_MS);
    }

    function tick() {
      dir = { ...nextDir };
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return endGame();
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return endGame();
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          bestEl.textContent = bestScore;
          localStorage.setItem('snakeBest', bestScore);
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      clearInterval(loopId);
      running = false;
      gameOver = true;
      draw();
      showOverlay('Game Over', `Score: ${score} &mdash; Press any key or tap to restart`);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * GRID, 0);
        ctx.lineTo(x * GRID, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * GRID);
        ctx.lineTo(canvas.width, y * GRID);
        ctx.stroke();
      }

      // Food
      ctx.fillStyle = '#ff1744';
      ctx.shadowColor = '#ff1744';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(
        food.x * GRID + GRID / 2,
        food.y * GRID + GRID / 2,
        GRID / 2 - 2, 0, Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const ratio = 1 - i / snake.length;
        const g = Math.floor(180 + 76 * ratio);
        ctx.fillStyle = i === 0 ? '#00e676' : `rgb(0, ${g}, 80)`;
        ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
        if (i === 0) {
          ctx.fillStyle = '#0f0f23';
          // Eyes
          const ex = dir.x === 0 ? 4 : (dir.x > 0 ? 5 : -1);
          const ey = dir.y === 0 ? 4 : (dir.y > 0 ? 5 : -1);
          ctx.fillRect(seg.x * GRID + 5 + (dir.y !== 0 ? -2 : ex), seg.y * GRID + 5 + (dir.x !== 0 ? -2 : ey), 3, 3);
          ctx.fillRect(seg.x * GRID + 5 + (dir.y !== 0 ? 8 : ex), seg.y * GRID + 5 + (dir.x !== 0 ? 8 : ey), 3, 3);
        }
      });
    }

    // Keyboard controls
    document.addEventListener('keydown', e => {
      const key = e.key;
      const arrows = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'];
      const wasd = ['w', 'a', 's', 'd', 'W', 'A', 'S', 'D'];

      if ([...arrows, ...wasd, ' '].includes(key)) {
        e.preventDefault();
      }

      if (gameOver) { init(); return; }

      const setDir = (x, y) => {
        if (dir.x !== -x || dir.y !== -y) {
          nextDir = { x, y };
        }
      };

      if (key === 'ArrowUp' || key === 'w' || key === 'W') setDir(0, -1);
      else if (key === 'ArrowDown' || key === 's' || key === 'S') setDir(0, 1);
      else if (key === 'ArrowLeft' || key === 'a' || key === 'A') setDir(-1, 0);
      else if (key === 'ArrowRight' || key === 'd' || key === 'D') setDir(1, 0);
      else return;

      if (!running) start();
    });

    // Touch / swipe controls
    let touchStart = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (gameOver) { init(); return; }
      const touch = e.touches[0];
      touchStart = { x: touch.clientX, y: touch.clientY };
    }, { passive: false });

    canvas.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (!touchStart) {
        if (!running && !gameOver) start();
        return;
      }
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStart.x;
      const dy = touch.clientY - touchStart.y;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);

      if (Math.max(absDx, absDy) < 20) {
        if (!running && !gameOver) start();
        touchStart = null;
        return;
      }

      const setDir = (x, y) => {
        if (dir.x !== -x || dir.y !== -y) {
          nextDir = { x, y };
        }
      };

      if (absDx > absDy) {
        setDir(dx > 0 ? 1 : -1, 0);
      } else {
        setDir(0, dy > 0 ? 1 : -1);
      }

      if (!running) start();
      touchStart = null;
    }, { passive: false });

    // Click to start (desktop)
    canvas.addEventListener('click', () => {
      if (gameOver) { init(); return; }
      if (!running) start();
    });

    init();
  </script>
</body>
</html>
